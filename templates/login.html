<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Closet Sale</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h2>Panel de Administración</h2>
    <p>Ingresa tus credenciales para continuar.</p>

    {% if error %}
      <div class="login-error">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="usuario" required autofocus autocomplete="username"/>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Contraseña</label>
        <input type="password" name="password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:13px">
        Entrar →
      </button>
    </form>
  </div>
</div>
</body>
</html>
